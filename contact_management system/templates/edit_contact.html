{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit Contact</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>Name</label>
    <input name="name" value="{{ contact.name }}" required>
    <label>Phone</label>
    <input name="phone" value="{{ contact.phone }}" required>
    <label>Email</label>
    <input name="email" type="email" value="{{ contact.email }}" required>
    <button class="submit" type="submit">Update Contact</button>
  </form>
</div>
{% endblock %}
